model:
  whisper_model: "openai/whisper-small"
  bart_model: "facebook/bart-base"
  freeze_audio: true
  freeze_text: false
  fused_dim: 768
  fusion_heads: 8
  fusion_layers: 2

data:
  train_manifest: "src/data/audio/train_manifest.json"
  val_manifest: "src/data/audio/val_manifest.json"
  max_audio_len: 480000
  max_text_len: 512
  max_target_len: 64
  num_workers: 2

rl:
  stage1_checkpoint: "src/checkpoints/pretrain/checkpoint_best.pt"
  ppo_epochs: 2
  clip_eps: 0.2
  vf_coef: 0.5
  kl_coef: 3.0
  kl_target: 0.03
  early_stop_patience: 10
  reward_weights:
    retrieval: 0.3
    nli: 0.3
    hallucination: 0.2
    exact_match: 0.5

training:
  batch_size: 4
  learning_rate: 5.0e-7
  weight_decay: 0.01
  warmup_steps: 50
  total_steps: 500
  max_grad_norm: 1.0
  fp16: true
  seed: 42
  log_every: 25
  save_every: 50
  checkpoint_dir: "src/checkpoints/rl"

wandb:
  enabled: false
  project: "react-rl"
  run_name: "stage2"
