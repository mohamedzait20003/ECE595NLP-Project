model:
  whisper_model: "openai/whisper-small"
  bart_model: "facebook/bart-base"
  freeze_audio: true
  freeze_text: false
  fused_dim: 768
  fusion_heads: 8
  fusion_layers: 2

data:
  train_manifest: "src/data/audio/train_manifest.json"
  val_manifest: "src/data/audio/val_manifest.json"
  max_audio_len: 480000
  max_text_len: 512
  max_target_len: 64
  num_workers: 2

training:
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  total_steps: 20000
  max_grad_norm: 1.0
  fp16: true
  seed: 42
  eval_every: 500
  save_every: 1000
  checkpoint_dir: "src/checkpoints/pretrain"
  log_every: 50

wandb:
  enabled: false
  project: "react-pretrain"
  run_name: "stage1"
